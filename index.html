<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>약톡</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="약톡">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:-apple-system,'Helvetica Neue',sans-serif; background:#f2f2f7; color:#1a1a1a; padding-bottom:80px; }

    .topbar { background:#fff; padding:36px 18px 16px; border-bottom:1px solid #e0e0e0; display:flex; align-items:center; justify-content:space-between; }
    .app-title { font-size:28px; font-weight:800; letter-spacing:-1px; color:#1a1a1a; }
    .user-badge { font-size:15px; color:#fff; font-weight:700; background:#1a1a1a; border-radius:18px; padding:7px 16px; }
    .topbar-right { display:flex; align-items:center; gap:8px; }
    .btn-logout { font-size:13px; color:#888; font-weight:600; background:#f2f2f7; border:none; border-radius:14px; padding:7px 14px; cursor:pointer; font-family:inherit; }

    .section { padding:22px 12px 0; }
    .section-label { font-size:15px; font-weight:700; color:#888; margin-bottom:12px; padding-left:4px; }

    .med-card { background:#fff; border:1px solid #e8e8e8; border-radius:16px; padding:18px 16px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .med-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .med-name { font-size:24px; font-weight:700; letter-spacing:-0.5px; color:#1a1a1a; }
    .med-time-badge { font-size:18px; font-weight:800; color:#B8860B; background:#FFF8DC; border-radius:10px; padding:4px 10px; }
    .med-date { font-size:15px; color:#888; margin-bottom:14px; }
    .med-btns { display:flex; gap:8px; }
    .btn-edit, .btn-del { flex:1; padding:12px 0; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn-edit { background:#f0f0f0; color:#1a1a1a; }
    .btn-del { background:#fff0f0; color:#cc0000; }

    .empty { text-align:center; padding:40px 20px; background:#fff; border-radius:16px; color:#aaa; font-size:18px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }

    .form-card { background:#fff; border:1px solid #e8e8e8; border-radius:16px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .form-field { padding:16px 16px 0; border-bottom:1px solid #f0f0f0; }
    .form-field:last-of-type { border-bottom:none; }
    .field-label { font-size:14px; font-weight:700; color:#888; margin-bottom:8px; }
    .field-input { width:100%; border:none; outline:none; font-size:22px; color:#1a1a1a; background:transparent; font-family:inherit; padding-bottom:14px; }
    .field-input::placeholder { color:#ccc; }
    .time-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .time-input { flex:1; border:none; outline:none; font-size:22px; color:#1a1a1a; background:transparent; font-family:inherit; }
    .btn-rm { width:30px; height:30px; border-radius:50%; background:#ff4444; color:white; border:none; font-size:18px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .btn-add-time { display:block; width:100%; background:none; border:none; color:#B8860B; font-size:18px; font-weight:700; padding:14px 16px; text-align:left; cursor:pointer; font-family:inherit; }
    .days-wrap { padding-bottom:16px; }
    .btn-everyday { display:block; width:100%; background:#f2f2f7; border:none; border-radius:10px; padding:10px; font-size:15px; font-weight:700; color:#1a1a1a; cursor:pointer; font-family:inherit; margin-bottom:10px; }
    .btn-everyday.on { background:#1a1a1a; color:#FFD700; }
    .days-row { display:flex; gap:6px; }
    .day-btn { flex:1; padding:10px 0; border:1.5px solid #e0e0e0; border-radius:10px; font-size:14px; font-weight:700; color:#888; background:#fff; cursor:pointer; font-family:inherit; text-align:center; }
    .day-btn.on { background:#1a1a1a; color:#FFD700; border-color:#1a1a1a; }
    .med-days { font-size:13px; color:#B8860B; margin-bottom:10px; }
    .btn-submit { display:block; width:calc(100% - 24px); margin:14px 12px; background:#1a1a1a; color:#FFD700; border:none; border-radius:14px; padding:18px; font-size:20px; font-weight:800; cursor:pointer; font-family:inherit; }

    .success-wrap { display:none; text-align:center; padding:40px 20px; }
    .success-wrap .check { font-size:56px; margin-bottom:14px; }
    .success-wrap p { font-size:22px; font-weight:700; color:#1a1a1a; }

    /* 로딩 화면 */
    .loading-wrap { display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; background:#fff; }
    .loading-wrap p { font-size:20px; color:#888; margin-top:16px; }
    .spinner { width:48px; height:48px; border:4px solid #f0f0f0; border-top-color:#FFD700; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* 로그인 화면 */
    .login-wrap { display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; padding:48px 32px; background:#fff; }
    .login-logo { font-size:70px; margin-bottom:24px; }
    .login-title { font-size:42px; font-weight:800; letter-spacing:-2px; margin-bottom:12px; color:#1a1a1a; }
    .login-desc { font-size:20px; color:#666; line-height:1.7; text-align:center; margin-bottom:48px; word-break:keep-all; }
    .kakao-btn { display:flex; align-items:center; justify-content:center; background:#FEE500; color:#000; font-size:20px; font-weight:800; padding:20px 24px; border-radius:16px; width:100%; border:none; cursor:pointer; font-family:inherit; }

    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; }
    .overlay.on { display:block; }
    .sheet { position:fixed; bottom:0; left:0; right:0; background:#fff; border-radius:28px 28px 0 0; padding:12px 18px 40px; z-index:201; transform:translateY(100%); visibility:hidden; transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); border-top:1px solid #e8e8e8; box-shadow:0 -4px 24px rgba(0,0,0,0.1); }
    .sheet.on { transform:translateY(0); visibility:visible; }
    .handle { width:40px; height:5px; background:#ddd; border-radius:3px; margin:0 auto 20px; }
    .sheet-title { font-size:22px; font-weight:800; margin-bottom:20px; letter-spacing:-0.5px; color:#1a1a1a; }
    .sheet-label { font-size:14px; color:#888; font-weight:700; margin-bottom:8px; }
    .sheet-input { width:100%; border:1.5px solid #e0e0e0; border-radius:12px; padding:14px 16px; font-size:20px; outline:none; font-family:inherit; margin-bottom:14px; color:#1a1a1a; background:#fff; }
    .sheet-input:focus { border-color:#1a1a1a; }
    .sheet-btns { display:flex; gap:10px; margin-top:10px; }
    .sheet-btns button { flex:1; padding:16px; border:none; border-radius:14px; font-size:18px; font-weight:700; cursor:pointer; font-family:inherit; }
    .s-cancel { background:#f2f2f7; color:#1a1a1a; }
    .s-confirm { background:#1a1a1a; color:#FFD700; }
    .s-delete { background:#fff0f0; color:#cc0000; border:1px solid #ffcccc; }
    .del-desc { font-size:16px; color:#888; margin-bottom:20px; }

    /* 하단 탭바 */
    .tabbar { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e0e0e0; display:flex; z-index:100; }
    .tab-btn { flex:1; padding:12px 0; border:none; background:none; font-size:11px; font-weight:600; color:#888; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .tab-btn.active { color:#1a1a1a; }
    .tab-icon { font-size:22px; }

    /* 복용 완료 버튼 */
    .btn-take { flex:1; padding:12px 0; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; background:#e8f5e9; color:#2e7d32; }
    .btn-take.done { background:#f0f0f0; color:#aaa; }

    /* 달력 */
    .calendar-wrap { background:#fff; border-radius:16px; margin:12px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .cal-title { font-size:18px; font-weight:800; }
    .cal-nav { background:none; border:none; font-size:20px; cursor:pointer; padding:4px 10px; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-day-label { text-align:center; font-size:12px; font-weight:700; color:#888; padding:4px 0; }
    .cal-day-label:first-child { color:#ff3b30; }
    .cal-day-label:last-child { color:#007aff; }
    .cal-cell { text-align:center; padding:6px 0; font-size:14px; border-radius:50%; position:relative; }
    .cal-cell.today { background:#1a1a1a; color:#FFD700; font-weight:800; border-radius:50%; }
    .cal-cell.empty { color:#ccc; }
    .cal-cell { cursor:pointer; }
    .cal-dot { font-size:9px; line-height:1; }
    .cal-count { font-size:9px; color:#888; }
    .cal-legend { display:flex; gap:12px; margin-top:12px; justify-content:flex-end; font-size:12px; color:#888; }

    /* 날짜 상세 팝업 */
    .day-detail { background:#fff; border-radius:16px; margin-top:12px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .day-detail-title { font-size:16px; font-weight:800; margin-bottom:12px; color:#1a1a1a; }
    .day-detail-item { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f0f0f0; font-size:14px; }
    .day-detail-item:last-child { border-bottom:none; }

    /* 복용 기록 탭 */
    .record-section { padding:12px; }
    .med-select { width:100%; padding:12px; border:1.5px solid #e0e0e0; border-radius:12px; font-size:16px; font-family:inherit; margin-bottom:12px; outline:none; background:#fff; }

    /* PWA 설치 배너 */
    .install-banner { display:none; position:fixed; bottom:0; left:0; right:0; background:#1a1a1a; color:#fff; padding:16px 20px; z-index:300; align-items:center; justify-content:space-between; }
    .install-banner.show { display:flex; }
    .install-text { font-size:18px; font-weight:600; }
    .install-btn { background:#FFD700; color:#000; border:none; border-radius:10px; padding:10px 20px; font-size:18px; font-weight:700; cursor:pointer; }
    .install-close { color:#aaa; font-size:24px; cursor:pointer; padding:0 8px; }
  </style>
</head>
<body>

<div id="app"></div>

<div class="overlay" id="editOverlay" onclick="closeSheet('edit')"></div>
<div class="sheet" id="editSheet">
  <div class="handle"></div>
  <div class="sheet-title">약 정보 수정</div>
  <input type="hidden" id="editRowNum">
  <div class="sheet-label">약 이름</div>
  <input class="sheet-input" type="text" id="editMedName">
  <div class="sheet-label">복용 시간 (쉼표로 구분)</div>
  <input class="sheet-input" type="text" id="editTimes" placeholder="08:00,12:00">
  <div class="sheet-label">시작일</div>
  <input class="sheet-input" type="date" id="editStartDate">
  <div class="sheet-label">종료일</div>
  <input class="sheet-input" type="date" id="editEndDate">
  <div class="sheet-label">복용 요일</div>
  <div class="days-wrap" style="margin-bottom:8px;">
    <button class="btn-everyday" id="editBtnEveryday" onclick="toggleEditEveryday()">매일</button>
    <div class="days-row">
      <button class="day-btn" data-day="월" onclick="toggleEditDay(this)">월</button>
      <button class="day-btn" data-day="화" onclick="toggleEditDay(this)">화</button>
      <button class="day-btn" data-day="수" onclick="toggleEditDay(this)">수</button>
      <button class="day-btn" data-day="목" onclick="toggleEditDay(this)">목</button>
      <button class="day-btn" data-day="금" onclick="toggleEditDay(this)">금</button>
      <button class="day-btn" data-day="토" onclick="toggleEditDay(this)">토</button>
      <button class="day-btn" data-day="일" onclick="toggleEditDay(this)">일</button>
    </div>
  </div>
  <div class="sheet-btns">
    <button class="s-cancel" onclick="closeSheet('edit')">취소</button>
    <button class="s-confirm" onclick="submitEdit()">저장</button>
  </div>
</div>

<div class="overlay" id="deleteOverlay" onclick="closeSheet('delete')"></div>
<div class="sheet" id="deleteSheet">
  <div class="handle"></div>
  <div class="sheet-title" id="deleteTitle">삭제할까요?</div>
  <div class="del-desc">삭제하면 알림이 중단돼요.</div>
  <div class="sheet-btns">
    <button class="s-cancel" onclick="closeSheet('delete')">취소</button>
    <button class="s-delete" onclick="confirmDelete()">삭제</button>
  </div>
</div>

<div class="tabbar">
  <button class="tab-btn active" id="tab-home" onclick="switchTab('home')">
    <span class="tab-icon">💊</span>
    <span>홈</span>
  </button>
  <button class="tab-btn" id="tab-record" onclick="switchTab('record')">
    <span class="tab-icon">📅</span>
    <span>기록</span>
  </button>
</div>

<div class="install-banner" id="installBanner">
  <div class="install-text">📲 홈화면에 약톡 추가하기</div>
  <button class="install-btn" id="installBtn">추가</button>
  <span class="install-close" onclick="closeBanner()">✕</span>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxN551p3xx9t1HPfe5lv_xAe0ZYoOxPKpdDdU9mydHAjKwR4_S-c7NATHGBk8jBvqu2vQ/exec';
  const KAKAO_REST_KEY = '6595cabe96f3e822f4deda7e1a0a4c70';
  const REDIRECT_URI = 'https://hoon0512.github.io/yaktalk/';

  let kakaoId = localStorage.getItem('kakaoId');
  let userName = localStorage.getItem('userName');
  let deleteTargetRow = null;
  let deferredPrompt = null;

  // PWA 설치 프롬프트
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (!localStorage.getItem('installDismissed')) {
      document.getElementById('installBanner').classList.add('show');
    }
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    }
  });

  function closeBanner() {
    localStorage.setItem('installDismissed', '1');
    document.getElementById('installBanner').classList.remove('show');
  }

  // ─── 앱 시작 ───────────────────────────────────────────
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');

  if (code) {
    // 카카오 로그인 후 돌아온 경우 → 로딩 화면 먼저 표시
    renderLoading();

    // Apps Script에 code 전달 → JSON으로 kakaoId, name 받기
    fetch(SCRIPT_URL + '?action=kakaoLogin&code=' + encodeURIComponent(code) + '&redirect_uri=' + encodeURIComponent(REDIRECT_URI))
      .then(r => r.json())
      .then(data => {
        if (data.kakaoId) {
          kakaoId = String(data.kakaoId);
          userName = data.name || '회원';
          localStorage.setItem('kakaoId', kakaoId);
          localStorage.setItem('userName', userName);
          // URL에서 code 파라미터 제거 후 마이페이지 이동
          window.history.replaceState({}, document.title, REDIRECT_URI);
          renderMyPage();
        } else {
          // 로그인 실패
          alert('로그인에 실패했어요. 다시 시도해주세요.\n' + (data.error || ''));
          localStorage.removeItem('kakaoId');
          localStorage.removeItem('userName');
          renderLogin();
        }
      })
      .catch(err => {
        alert('오류가 발생했어요: ' + err.message);
        renderLogin();
      });

  } else if (kakaoId && userName) {
    renderMyPage();
  } else {
    renderLogin();
  }

  // ─── 화면 렌더링 함수들 ────────────────────────────────

  function renderLoading() {
    document.getElementById('app').innerHTML = `
      <div class="loading-wrap">
        <div class="spinner"></div>
        <p>로그인 중...</p>
      </div>
    `;
  }

  function renderLogin() {
    const kakaoAuthUrl = 'https://kauth.kakao.com/oauth/authorize'
      + '?client_id=' + KAKAO_REST_KEY
      + '&redirect_uri=' + encodeURIComponent(REDIRECT_URI)
      + '&response_type=code';

    document.getElementById('app').innerHTML = `
      <div class="login-wrap">
        <div class="login-logo">💊</div>
        <div class="login-title">약톡</div>
        <div class="login-desc">복약 알림을 카카오톡으로.<br>매일 제때 챙겨드릴게요.</div>
        <button class="kakao-btn" onclick="location.href='${kakaoAuthUrl}'">카카오로 시작하기</button>
      </div>
    `;
  }

  function renderMyPage() {
    fetch(SCRIPT_URL + '?action=mypage&kakaoId=' + kakaoId + '&name=' + encodeURIComponent(userName))
      .then(r => r.json())
      .then(data => {
        let medsHtml = '';
        if (data.meds && data.meds.length > 0) {
          data.meds.sort((a, b) => {
            const aTime = a.times.split(',')[0].trim();
            const bTime = b.times.split(',')[0].trim();
            return aTime.localeCompare(bTime);
          });
          medsHtml = data.meds.map(m => `
            <div class="med-card">
              <div class="med-top">
                <div class="med-name">${m.medName}</div>
                <div class="med-time-badge">${m.times}</div>
              </div>
              <div class="med-date">${m.startDate} ~ ${m.endDate}</div>
              ${m.days ? '<div class="med-days">📅 ' + m.days + '</div>' : ''}
              <div class="med-btns" style="margin-bottom:8px;">
                <button class="btn-take" id="take_${m.rowNum}" onclick="takeMed(${m.rowNum}, '${m.medName}')">💊 복용 완료</button>
              </div>
              <div class="med-btns">
                <button class="btn-edit" onclick="startEdit(${m.rowNum}, '${m.medName}', '${m.times}', '${m.startDate}', '${m.endDate}', '${m.days||''}')">수정</button>
                <button class="btn-del" onclick="deleteMed(${m.rowNum}, '${m.medName}')">삭제</button>
              </div>
            </div>
          `).join('');
        } else {
          medsHtml = '<div class="empty"><div style="font-size:64px;margin-bottom:20px">📋</div><div>등록된 약이 없어요</div></div>';
        }

        const today = new Date().toISOString().split('T')[0];
        const endDef = new Date(); endDef.setDate(endDef.getDate()+7);

        document.getElementById('app').innerHTML = `
          <div class="topbar">
            <div class="app-title">💊 약톡</div>
            <div class="topbar-right">
              <div class="user-badge">${userName}님</div>
              <button class="btn-logout" onclick="logout()">로그아웃</button>
            </div>
          </div>
          <div class="section">
            <div class="section-label">복약 목록</div>
            ${medsHtml}
          </div>
          <div class="section" style="padding-bottom:0;">
            <div class="section-label">새 약 추가</div>
            <div class="form-card">
              <div id="addForm">
                <div class="form-field">
                  <div class="field-label">약 이름</div>
                  <input class="field-input" type="text" id="medName" placeholder="예: 혈압약, 비타민C">
                </div>
                <div class="form-field">
                  <div class="field-label">복용 시간</div>
                  <div id="timesContainer">
                    <div class="time-row">
                      <input type="time" class="time-input" value="08:00">
                      <button class="btn-rm" onclick="removeTime(this)">×</button>
                    </div>
                  </div>
                  <button class="btn-add-time" onclick="addTime()">＋ 시간 추가</button>
                </div>
                <div class="form-field">
                  <div class="field-label">시작일</div>
                  <input class="field-input" type="date" id="startDate" value="${today}">
                </div>
                <div class="form-field">
                  <div class="field-label">종료일</div>
                  <input class="field-input" type="date" id="endDate" value="${endDef.toISOString().split('T')[0]}">
                </div>
                <div class="form-field" style="border-bottom:none;">
                  <div class="field-label">복용 요일</div>
                  <div class="days-wrap">
                    <button class="btn-everyday on" id="btnEveryday" onclick="toggleEveryday()">매일</button>
                    <div class="days-row">
                      <button class="day-btn on" data-day="월" onclick="toggleDay(this)">월</button>
                      <button class="day-btn on" data-day="화" onclick="toggleDay(this)">화</button>
                      <button class="day-btn on" data-day="수" onclick="toggleDay(this)">수</button>
                      <button class="day-btn on" data-day="목" onclick="toggleDay(this)">목</button>
                      <button class="day-btn on" data-day="금" onclick="toggleDay(this)">금</button>
                      <button class="day-btn on" data-day="토" onclick="toggleDay(this)">토</button>
                      <button class="day-btn on" data-day="일" onclick="toggleDay(this)">일</button>
                    </div>
                  </div>
                </div>
                <button class="btn-submit" onclick="submitForm()">등록하기</button>
              </div>
              <div class="success-wrap" id="successWrap">
                <div class="check">✅</div>
                <p>등록 완료!</p>
              </div>
            </div>
          </div>
        `;
      })
      .catch(err => {
        document.getElementById('app').innerHTML = `
          <div class="loading-wrap">
            <p style="color:#cc0000">오류: ${err.message}</p>
          </div>
        `;
      });
  }

  // ===== 탭 전환 =====
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'home') renderMyPage();
    if (tab === 'record') renderRecord();
  }

  // ===== 복용 완료 =====
  function takeMed(rowNum, medName) {
    const btn = document.getElementById('take_' + rowNum);
    if (btn.classList.contains('done')) return;
    // 즉시 UI 반응 (서버 응답 기다리지 않음)
    btn.classList.add('done');
    btn.textContent = '✅ 복용 완료!';
    const today = new Date();
    const kst = new Date(today.getTime() + (9 * 60 * 60 * 1000));
    const dateStr = kst.toISOString().split('T')[0];
    const timeStr = kst.toISOString().split('T')[1].substring(0,5);
    fetch(SCRIPT_URL + '?action=confirm&kakaoId=' + kakaoId + '&rowNum=' + rowNum + '&medName=' + encodeURIComponent(medName) + '&date=' + dateStr + '&times=' + timeStr)
      .catch(() => {
        btn.classList.remove('done');
        btn.textContent = '💊 복용 완료';
      });
  }

  // ===== 기록 탭 =====
  function renderRecord() {
    document.getElementById('app').innerHTML = `
      <div class="topbar">
        <div class="app-title">💊 약톡</div>
        <div class="topbar-right">
          <div class="user-badge">${userName}님</div>
          <button class="btn-logout" onclick="logout()">로그아웃</button>
        </div>
      </div>
      <div class="record-section">
        <div class="section-label" style="padding:8px 4px;">복용 기록</div>
        <div id="calendarWrap"></div>
      </div>
    `;
    loadCalendar(new Date());
  }

  function loadCalendar(date) {
    fetch(SCRIPT_URL + '?action=getLogs&kakaoId=' + kakaoId)
      .then(r => r.json())
      .then(data => {
        renderCalendar(date, data.logs || []);
      })
      .catch(() => renderCalendar(date, []));
  }

  let currentLogs = [];

  function renderCalendar(date, logs) {
    currentLogs = logs;
    const year = date.getFullYear();
    const month = date.getMonth();
    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];

    // 날짜별 복용 기록 그룹화
    const dateMap = {};
    logs.forEach(l => {
      if (!dateMap[l.date]) dateMap[l.date] = [];
      dateMap[l.date].push(l.medName);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();
    const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

    let cells = '';
    for (let i = 0; i < firstDay; i++) cells += '<div class="cal-cell empty"></div>';
    for (let d = 1; d <= lastDate; d++) {
      const dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const isToday = dateStr === todayStr;
      const dayLogs = dateMap[dateStr] || [];
      const count = dayLogs.length;

      let dot = '';
      if (count > 0) {
        dot = `<div class="cal-dot">🟢</div><div class="cal-count">${count}개</div>`;
      }

      cells += `<div class="cal-cell ${isToday ? 'today' : ''}" onclick="showDayDetail('${dateStr}')" style="display:flex;flex-direction:column;align-items:center;padding:4px 0;">${d}${dot}</div>`;
    }

    document.getElementById('calendarWrap').innerHTML = `
      <div class="calendar-wrap">
        <div class="cal-header">
          <button class="cal-nav" onclick="loadCalendar(new Date(${year}, ${month-1}, 1))">‹</button>
          <div class="cal-title">${year}년 ${monthNames[month]}</div>
          <button class="cal-nav" onclick="loadCalendar(new Date(${year}, ${month+1}, 1))">›</button>
        </div>
        <div class="cal-grid">
          <div class="cal-day-label">일</div>
          <div class="cal-day-label">월</div>
          <div class="cal-day-label">화</div>
          <div class="cal-day-label">수</div>
          <div class="cal-day-label">목</div>
          <div class="cal-day-label">금</div>
          <div class="cal-day-label">토</div>
          ${cells}
        </div>
        <div class="cal-legend">🟢 복용 완료 &nbsp; 날짜 탭하면 상세 확인</div>
      </div>
      <div id="dayDetail"></div>
    `;
  }

  function showDayDetail(dateStr) {
    // 중복 제거 - 같은 날 같은 약 이름은 한 번만 표시
    const seen = new Set();
    const dayLogs = currentLogs.filter(l => {
      if (l.date === dateStr && !seen.has(l.medName)) {
        seen.add(l.medName);
        return true;
      }
      return false;
    });
    const detailEl = document.getElementById('dayDetail');
    if (!detailEl) return;

    if (dayLogs.length === 0) {
      detailEl.innerHTML = `
        <div class="day-detail">
          <div class="day-detail-title">📅 ${dateStr}</div>
          <div style="color:#aaa;font-size:14px;text-align:center;padding:16px 0;">복용 기록이 없어요</div>
        </div>`;
      return;
    }

    const items = dayLogs.map(l => `
      <div class="day-detail-item">
        <span>💊 ${l.medName}</span>
        <span style="color:#2e7d32;font-weight:700;">✅ 복용 완료</span>
      </div>`).join('');

    detailEl.innerHTML = `
      <div class="day-detail">
        <div class="day-detail-title">📅 ${dateStr} 복용 기록</div>
        ${items}
      </div>`;
  }

  function logout() {
    if (confirm('로그아웃 하시겠어요?')) {
      localStorage.removeItem('kakaoId');
      localStorage.removeItem('userName');
      renderLogin();
    }
  }

  function addTime() {
    const d = document.createElement('div');
    d.className = 'time-row';
    d.innerHTML = '<input type="time" class="time-input" value="12:00"><button class="btn-rm" onclick="removeTime(this)">×</button>';
    document.getElementById('timesContainer').appendChild(d);
  }

  function removeTime(btn) {
    if (document.querySelectorAll('.time-row').length > 1) btn.parentElement.remove();
  }

  function toggleEveryday() {
    const btn = document.getElementById('btnEveryday');
    const dayBtns = document.querySelectorAll('#addForm .day-btn');
    const isOn = btn.classList.toggle('on');
    dayBtns.forEach(b => { if(isOn) b.classList.add('on'); else b.classList.remove('on'); });
  }

  function toggleDay(btn) {
    btn.classList.toggle('on');
    const allOn = document.querySelectorAll('#addForm .day-btn.on').length === 7;
    document.getElementById('btnEveryday').classList.toggle('on', allOn);
  }

  function getSelectedDays() {
    const selected = Array.from(document.querySelectorAll('#addForm .day-btn.on')).map(b => b.dataset.day);
    if (selected.length === 7 || selected.length === 0) return '매일';
    return selected.join(',');
  }

  function submitForm() {
    const medName = document.getElementById('medName').value.trim();
    const times = Array.from(document.querySelectorAll('.time-input')).map(i=>i.value).join(',');
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const days = getSelectedDays();
    if (!medName) { alert('약 이름을 입력해주세요'); return; }
    fetch(SCRIPT_URL, { method:'POST', body: new URLSearchParams({action:'saveMedication',kakaoId,medName,times,startDate,endDate,days}) })
      .then(() => {
        document.getElementById('addForm').style.display = 'none';
        document.getElementById('successWrap').style.display = 'block';
        setTimeout(() => renderMyPage(), 1200);
      });
  }

  function openSheet(type) {
    document.getElementById(type+'Overlay').classList.add('on');
    setTimeout(() => document.getElementById(type+'Sheet').classList.add('on'), 10);
  }

  function closeSheet(type) {
    document.getElementById(type+'Sheet').classList.remove('on');
    setTimeout(() => document.getElementById(type+'Overlay').classList.remove('on'), 300);
  }

  function toggleEditEveryday() {
    const btn = document.getElementById('editBtnEveryday');
    const dayBtns = document.querySelectorAll('#editSheet .day-btn');
    const isOn = btn.classList.toggle('on');
    dayBtns.forEach(b => { if(isOn) b.classList.add('on'); else b.classList.remove('on'); });
  }

  function toggleEditDay(btn) {
    btn.classList.toggle('on');
    const allOn = document.querySelectorAll('#editSheet .day-btn.on').length === 7;
    document.getElementById('editBtnEveryday').classList.toggle('on', allOn);
  }

  function getEditSelectedDays() {
    const selected = Array.from(document.querySelectorAll('#editSheet .day-btn.on')).map(b => b.dataset.day);
    if (selected.length === 7 || selected.length === 0) return '매일';
    return selected.join(',');
  }

  function startEdit(rowNum, medName, times, startDate, endDate, days) {
    document.getElementById('editRowNum').value = rowNum;
    document.getElementById('editMedName').value = medName;
    document.getElementById('editTimes').value = times;
    document.getElementById('editStartDate').value = startDate;
    document.getElementById('editEndDate').value = endDate;
    // 요일 버튼 초기화
    const dayBtns = document.querySelectorAll('#editSheet .day-btn');
    dayBtns.forEach(b => b.classList.remove('on'));
    document.getElementById('editBtnEveryday').classList.remove('on');
    if (!days || days === '매일') {
      document.getElementById('editBtnEveryday').classList.add('on');
      dayBtns.forEach(b => b.classList.add('on'));
    } else {
      const selectedDays = days.split(',').map(d => d.trim());
      dayBtns.forEach(b => { if(selectedDays.includes(b.dataset.day)) b.classList.add('on'); });
    }
    openSheet('edit');
  }

  function submitEdit() {
    const rowNum = document.getElementById('editRowNum').value;
    const medName = document.getElementById('editMedName').value.trim();
    const times = document.getElementById('editTimes').value.trim();
    const startDate = document.getElementById('editStartDate').value;
    const endDate = document.getElementById('editEndDate').value;
    const days = getEditSelectedDays();
    if (!medName) { alert('약 이름을 입력해주세요'); return; }
    fetch(SCRIPT_URL, { method:'POST', body: new URLSearchParams({action:'updateMedication',rowNum,medName,times,startDate,endDate,days}) })
      .then(() => { closeSheet('edit'); renderMyPage(); });
  }

  function deleteMed(rowNum, medName) {
    deleteTargetRow = rowNum;
    document.getElementById('deleteTitle').textContent = '"'+medName+'" 삭제할까요?';
    openSheet('delete');
  }

  function confirmDelete() {
    fetch(SCRIPT_URL, { method:'POST', body: new URLSearchParams({action:'deleteMedication',rowNum:deleteTargetRow}) })
      .then(() => { closeSheet('delete'); renderMyPage(); });
  }

  // Service Worker 등록
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
